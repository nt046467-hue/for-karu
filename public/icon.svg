<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Gold band -->
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff6d8"/>
      <stop offset="20%" stop-color="#f9df8a"/>
      <stop offset="50%" stop-color="#e0af3a"/>
      <stop offset="75%" stop-color="#b8801a"/>
      <stop offset="100%" stop-color="#8a5f06"/>
    </linearGradient>
    <linearGradient id="goldShine2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Diamond table + facets -->
    <linearGradient id="dTable" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#cdeeff"/>
      <stop offset="100%" stop-color="#7fd0ec"/>
    </linearGradient>
    <linearGradient id="dFacetLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfe9f8"/>
    </linearGradient>
    <linearGradient id="dFacetDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9fe0f5"/>
      <stop offset="100%" stop-color="#4fb3d9"/>
    </linearGradient>
    <radialGradient id="dGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow2" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0.6" stdDeviation="0.55" flood-color="#4a3200" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Band -->
  <circle cx="16" cy="20" r="8.3" fill="none" stroke="url(#gold2)" stroke-width="3" filter="url(#shadow2)"/>
  <circle cx="16" cy="20" r="8.3" fill="none" stroke="#5a3d00" stroke-width="0.35" opacity="0.25"/>
  <path d="M9.3 16 A8.3 8.3 0 0 1 14.5 12.1" fill="none" stroke="url(#goldShine2)" stroke-width="1" stroke-linecap="round"/>

  <!-- Prongs -->
  <path d="M11.8 12.5 L12.9 10 M20.2 12.5 L19.1 10" stroke="url(#gold2)" stroke-width="1.05" stroke-linecap="round"/>
  <circle cx="12.9" cy="10" r="0.55" fill="url(#gold2)"/>
  <circle cx="19.1" cy="10" r="0.55" fill="url(#gold2)"/>

  <!-- Round brilliant diamond -->
  <g filter="url(#shadow2)">
    <!-- crown outline (octagon-ish for brilliance) -->
    <polygon points="16,4.6 18.6,6.2 19.6,9 18.6,11.8 16,13.4 13.4,11.8 12.4,9 13.4,6.2"
             fill="url(#dTable)" stroke="#ffffff" stroke-width="0.2"/>
    <!-- table facet -->
    <polygon points="16,7 17.5,8 17.5,10 16,11 14.5,10 14.5,8" fill="url(#dFacetLight)" opacity="0.9"/>
    <!-- side facets alternating light/dark for brilliance -->
    <polygon points="16,4.6 17.5,8 16,7" fill="url(#dFacetLight)" opacity="0.85"/>
    <polygon points="18.6,6.2 17.5,8 17.5,10" fill="url(#dFacetDark)" opacity="0.8"/>
    <polygon points="19.6,9 17.5,10 18.6,11.8" fill="url(#dFacetLight)" opacity="0.75"/>
    <polygon points="16,13.4 17.5,10 16,11" fill="url(#dFacetDark)" opacity="0.85"/>
    <polygon points="13.4,11.8 14.5,10 16,11" fill="url(#dFacetLight)" opacity="0.8"/>
    <polygon points="12.4,9 14.5,10 14.5,8" fill="url(#dFacetDark)" opacity="0.75"/>
    <polygon points="13.4,6.2 14.5,8 16,7" fill="url(#dFacetLight)" opacity="0.8"/>
    <!-- fine facet lines -->
    <path d="M16,7 L16,4.6 M17.5,8 L18.6,6.2 M17.5,10 L19.6,9 M16,11 L16,13.4 M14.5,10 L13.4,11.8 M14.5,8 L12.4,9"
          stroke="#ffffff" stroke-width="0.15" opacity="0.6"/>
  </g>

  <!-- sparkle glow -->
  <circle cx="15.2" cy="7.6" r="3.4" fill="url(#dGlow)" opacity="0.6"/>

  <!-- external sparkles -->
  <g fill="#ffffff">
    <path d="M6 9.5 L6.6 10.9 L8 11.5 L6.6 12.1 L6 13.5 L5.4 12.1 L4 11.5 L5.4 10.9 Z" opacity="0.9"/>
    <path d="M25.5 12.5 L25.9 13.4 L26.8 13.8 L25.9 14.2 L25.5 15.1 L25.1 14.2 L24.2 13.8 L25.1 13.4 Z" opacity="0.7"/>
    <circle cx="21.5" cy="6.5" r="0.5" opacity="0.8"/>
  </g>
</svg>
